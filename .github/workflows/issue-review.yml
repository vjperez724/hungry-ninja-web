name: Issue Ambiguity Review

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to review
        required: true
        type: number

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Determine issue number
        id: issue
        run: echo "number=${{ github.event.inputs.issue_number || github.event.issue.number }}" >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 15
          prompt: |
            Review GitHub issue #${{ steps.issue.outputs.number }} for ambiguity before implementation begins.

            Check for:
            - Vague or missing acceptance criteria
            - Undefined terms or unclear scope
            - Missing technical constraints needed to implement it
            - Conflicting or incomplete requirements

            Then:
            1. Post a single comment on the issue summarizing what you found. If nothing is ambiguous, say so briefly - don't invent nitpicks.
            2. Only if you found ambiguity worth resolving before implementation, apply the `needs-clarification` label to the issue.
